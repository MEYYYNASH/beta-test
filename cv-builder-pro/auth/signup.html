<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | CV Builder Pro</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      color: white;
      transition: var(--transition);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.1);
    }

    .social-login {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .social-btn {
      padding: 0.75rem;
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      background: var(--bg-glass);
      color: white;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--border-glass-bright);
    }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="auth-container">
    <div class="glass-card auth-card">
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="../index.html" style="text-decoration: none; display: inline-block; margin-bottom: 1rem;">
          <i class="fas fa-file-invoice fa-3x gradient-primary"></i>
        </a>
        <h2>Create Account</h2>
        <p style="color: var(--text-secondary);">Start building your professional future today.</p>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        <div style="margin-bottom: 1.5rem; font-size: 0.75rem; color: var(--text-muted); line-height: 1.4;">
          By clicking "Create Account", you agree to our <a href="#" style="color: var(--primary); text-decoration: none;">Terms of Service</a> and <a href="#" style="color: var(--primary); text-decoration: none;">Privacy Policy</a>.
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
      </form>

      <div style="margin: 1.5rem 0; text-align: center; position: relative;">
        <hr style="border: 0; border-top: 1px solid var(--border-glass);">
        <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0f172a; padding: 0 1rem; color: var(--text-muted); font-size: 0.75rem;">OR SIGN UP WITH</span>
      </div>

      <div class="social-login">
        <button class="social-btn"><i class="fab fa-google"></i></button>
        <button class="social-btn"><i class="fab fa-github"></i></button>
        <button class="social-btn"><i class="fab fa-linkedin-in"></i></button>
      </div>

      <p style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: var(--text-secondary);">
        Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Log in</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // Mock signup - redirect to dashboard
      window.location.href = '../dashboard/index.html';
    });
  </script>
</body>
</html>
